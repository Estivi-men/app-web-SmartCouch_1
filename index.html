<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCouch - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            display: flex;
            max-width: 900px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        .login-left {
            flex: 1;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
        }
        .login-right {
            flex: 1;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .login-right::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
        }
        .login-right .content { position: relative; z-index: 1; }
        .login-right i { font-size: 64px; margin-bottom: 24px; opacity: 0.9; }
        .login-right h2 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
        .login-right p { font-size: 15px; line-height: 1.7; opacity: 0.85; }
        .login-right .features { margin-top: 32px; display: flex; flex-direction: column; gap: 16px; }
        .login-right .features .feat {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            opacity: 0.9;
        }
        .login-right .features .feat i {
            font-size: 16px;
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }
        .brand i { font-size: 28px; color: #6366f1; }
        .brand h1 { font-size: 22px; font-weight: 700; color: #1e293b; }
        .brand h1 span { color: #6366f1; }
        .login-left h3 { font-size: 24px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
        .login-left .sub { font-size: 14px; color: #64748b; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }
        .form-group .input-wrapper {
            display: flex;
            align-items: center;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            padding: 0 16px;
            transition: border-color 0.2s;
            background: #f8fafc;
        }
        .form-group .input-wrapper:focus-within {
            border-color: #6366f1;
            background: #fff;
        }
        .form-group .input-wrapper i {
            color: #94a3b8;
            font-size: 16px;
        }
        .form-group .input-wrapper input {
            width: 100%;
            padding: 14px 12px;
            border: none;
            background: transparent;
            font-size: 14px;
            outline: none;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #64748b;
            cursor: pointer;
        }
        .form-options label input { accent-color: #6366f1; }
        .form-options a {
            font-size: 13px;
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }
        .form-options a:hover { text-decoration: underline; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-login:hover { background: #4f46e5; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .error-msg {
            color: #dc2626;
            font-size: 13px;
            margin-top: 12px;
            display: none;
            align-items: center;
            gap: 6px;
        }
        .error-msg.show { display: flex; }

        @media (max-width: 768px) {
            .login-right { display: none; }
            .login-left { padding: 32px 24px; }
            .brand { margin-bottom: 24px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="brand">
                <i class="fas fa-couch"></i>
                <h1>Smart<span>Couch</span></h1>
            </div>
            <h3>Bienvenido de nuevo</h3>
            <p class="sub">Inicia sesión para acceder al panel</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Usuario</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Ingresa tu contraseña" autocomplete="current-password">
                    </div>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" checked> Recordarme
                    </label>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-arrow-right" style="margin-right:8px;"></i> Iniciar Sesión
                </button>

                <div class="error-msg" id="errorMsg">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Usuario o contraseña incorrectos</span>
                </div>
            </form>
        </div>

        <div class="login-right">
            <div class="content">
                <i class="fas fa-couch"></i>
                <h2>Panel de Control</h2>
                <p>Gestiona tus usuarios, supervisa ganancias y administra tu plataforma desde un solo lugar.</p>
                <div class="features">
                    <div class="feat"><i class="fas fa-users"></i> Gestión de usuarios</div>
                    <div class="feat"><i class="fas fa-user-shield"></i> Super usuarios</div>
                    <div class="feat"><i class="fas fa-chart-line"></i> Estadísticas y ganancias</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!user || !pass) {
                errorMsg.querySelector('span').textContent = 'Completa todos los campos';
                errorMsg.classList.add('show');
                return;
            }

            window.location.href = 'dashboard.html';
        });

        document.getElementById('username').addEventListener('input', () => {
            document.getElementById('errorMsg').classList.remove('show');
        });
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('errorMsg').classList.remove('show');
        });
    </script>
</body>
</html>
